<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Coding Agent</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --danger: #f85149;
    --success: #3fb950;
    --warning: #d29922;
    --code-bg: #1c2128;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }
  .panel {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-header .badge {
    font-size: 10px;
    background: var(--accent);
    color: #000;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 700;
  }
  /* Chat Panel */
  #chat-panel { grid-column: 1; grid-row: 1; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 90%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.exec {
    background: #1c2128;
    border: 1px solid #30363d;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    max-height: 300px;
    overflow-y: auto;
    align-self: flex-start;
    width: 100%;
    max-width: 100%;
  }
  .msg.exec .exec-stdout { color: var(--text); }
  .msg.exec .exec-stderr { color: var(--danger); }
  .msg.exec .exec-system { color: var(--text-muted); font-style: italic; }
  .msg.user {
    background: #1f6feb33;
    align-self: flex-end;
    border: 1px solid #1f6feb44;
  }
  .msg.assistant {
    background: var(--code-bg);
    align-self: flex-start;
    border: 1px solid var(--border);
  }
  .msg.tool {
    background: #3fb95022;
    align-self: flex-start;
    border: 1px solid #3fb95033;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
  }
  .msg.error {
    background: #f8514922;
    align-self: flex-start;
    border: 1px solid #f8514933;
  }
  .msg .tool-name {
    font-weight: 600;
    color: var(--accent);
  }
  .msg .tool-result {
    margin-top: 4px;
    color: var(--text-muted);
  }
  .input-area {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    min-height: 40px;
    max-height: 120px;
  }
  .input-area textarea:focus { outline: none; border-color: var(--accent); }
  .input-area button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  .input-area button:hover { background: var(--accent-hover); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  /* Execution Panel */
  
  /* Settings */
  #settings-bar {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #settings-bar label {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #settings-bar input, #settings-bar select {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 3px 6px;
    font-size: 11px;
    font-family: monospace;
  }
  #settings-bar input:focus, #settings-bar select:focus { outline: none; border-color: var(--accent); }
  #settings-bar input[type="password"] { width: 200px; }
  #settings-bar select { width: 140px; }
  .btn-small {
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }
  .btn-small.danger:hover { border-color: var(--danger); color: var(--danger); }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  /* Loading dots */
  .loading::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── Mobile / narrow portrait layout ─────────────────────────── */
  @media (max-width: 768px) {
    body { overflow: auto; }
    .app {
      display: flex;
      flex-direction: column;
      height: auto;
      min-height: 100vh;
      gap: 0;
    }
    .panel {
      height: 50vh;
      min-height: 300px;
      flex-shrink: 0;
    }
    #chat-panel { height: 100vh; min-height: 100vh; }

    #settings-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      padding: 6px 8px;
    }
    #settings-bar label {
      flex-wrap: wrap;
      font-size: 10px;
    }
    #settings-bar input[type="password"] { width: 100%; }
    #settings-bar input[type="text"] { width: 100% !important; }
    #settings-bar select { width: 100% !important; }
    #settings-bar .btn-small { font-size: 10px; padding: 2px 6px; }
    #settings-bar #config-name-input { width: 100% !important; }

    

    .input-area textarea { font-size: 12px; min-height: 36px; }
    .input-area button { font-size: 12px; padding: 6px 12px; }

    

    .msg { font-size: 12px; max-width: 95%; }
  }

  @media (max-width: 480px) {
    .panel-header { font-size: 10px; padding: 4px 8px; }
    .panel-header .badge { font-size: 8px; }
    #chat-panel { height: 100vh; min-height: 100vh; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Chat Panel -->
  <div class="panel" id="chat-panel">
    <div class="panel-header" id="panel-header" style="cursor:pointer">
      <span>💬 Chat</span>
      <span class="badge" id="model-badge">agent</span>
    </div>
    <div id="settings-bar" style="display:none">
      <label>Config <select id="config-select" style="width:160px"></select></label>
      <button class="btn-small" id="save-config-btn">💾 Save</button>
      <button class="btn-small danger" id="delete-config-btn">🗑 Delete</button>
      <label>Name <input type="text" id="config-name-input" placeholder="my-config" style="width:100px"></label>
      <label>API Key <input type="password" id="api-key-input" placeholder="sk-..."></label>
      <label>Model <input type="text" id="model-select" value="gpt-4o" style="width:140px"></label>
      <label>API URL <select id="api-url-input" style="width:200px"></select></label>
      <button class="btn-small" id="clear-chat-btn">Clear Chat</button>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="chat-input" placeholder="Ask the agent to write code..." rows="2"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Files Panel (removed) -->

  <!-- Execution Panel (removed — exec results appear inline in chat) -->
</div>

<!-- Sandbox iframe (hidden) -->
<iframe id="sandbox" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>

<script>
// ============================================================
// 1. STORAGE LAYER (localStorage-backed file system)
// ============================================================
const STORAGE_KEY = 'agent_files';
const API_KEY_KEY = 'agent_api_key';
const MSGS_KEY = 'agent_messages';
const MODEL_KEY = 'agent_model';
const API_URL_KEY = 'agent_api_url';
const CONFIGS_KEY = 'agent_configs';
const ACTIVE_CONFIG_KEY = 'agent_active_config';

// Inference URLs extracted from agent_probe JSON spec files
const INFERENCE_URLS = [
  "https://openrouter.ai/api/v1",
  "https://assert-service.services.ai.azure.com/openai/deployments/deepseek-v4-flash?api-version=2024-12-01-preview",
  "https://assert-service.services.ai.azure.com/openai/deployments/kimi-k2.6?api-version=2024-12-01-preview",
  "https://integrate.api.nvidia.com/v1",
  "https://api.modelstream.ai/v1",
  "https://opencode.ai/zen/v1",
  "https://gpu1.eecs.kth.se/services/ollama-keys/v1"
];

function getFiles() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function setFiles(files) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
}
function readFile(path) {
  const files = getFiles();
  if (files[path] === undefined) return { error: `File not found: ${path}` };
  return { content: files[path] };
}
function writeFile(path, content) {
  const files = getFiles();
  files[path] = content;
  setFiles(files);
  return { success: true, path };
}
function deleteFile(path) {
  const files = getFiles();
  if (files[path] === undefined) return { error: `File not found: ${path}` };
  delete files[path];
  setFiles(files);
  return { success: true, path };
}
function strReplace(path, oldStr, newStr) {
  const files = getFiles();
  if (files[path] === undefined) return { error: `File not found: ${path}` };
  const content = files[path];
  const idx = content.indexOf(oldStr);
  if (idx === -1) return { error: `String not found in ${path}` };
  files[path] = content.substring(0, idx) + newStr + content.substring(idx + oldStr.length);
  setFiles(files);
  return { success: true, path, replaced: oldStr.length, newLength: files[path].length };
}
function listFiles() {
  return Object.keys(getFiles()).sort();
}

// ============================================================
// 2. SANDBOXED CODE EXECUTION
// ============================================================
let execId = 0;
const execCallbacks = {};

function initSandbox() {
  const iframe = document.getElementById('sandbox');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(`
    <!DOCTYPE html>
    <html><body>
    <script>
      // Minimal harness - exposes all browser APIs
      const originalConsole = console;
      const outputs = [];
      function captureConsole() {
        const methods = ['log','info','warn','error','debug','dir','table'];
        methods.forEach(m => {
          const orig = originalConsole[m];
          console[m] = function(...args) {
            outputs.push({ type: m === 'error' ? 'stderr' : 'stdout', text: args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') });
            orig.apply(originalConsole, args);
          };
        });
      }
      captureConsole();

      // Handle execution requests
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'execute') {
          const id = e.data.id;
          const code = e.data.code;
          outputs.length = 0;
          let result, error = null;
          try {
            // Wrap in async function to support top-level await
            const asyncFn = new AsyncFunction('"use strict"; ' + code);
            const promise = asyncFn();
            if (promise && typeof promise.then === 'function') {
              promise.then(r => {
                result = r;
                parent.postMessage({ type: 'exec-result', id, result: formatResult(result), outputs: outputs.slice(), error: null }, '*');
              }).catch(err => {
                parent.postMessage({ type: 'exec-result', id, result: null, outputs: outputs.slice(), error: err.message }, '*');
              });
              return;
            }
            result = promise;
          } catch(err) {
            error = err.message;
          }
          parent.postMessage({ type: 'exec-result', id, result: formatResult(result), outputs: outputs.slice(), error }, '*');
        }
      });

      function formatResult(r) {
        if (r === undefined) return 'undefined';
        if (r === null) return 'null';
        try { return JSON.stringify(r, null, 2); } catch { return String(r); }
      }

      // AsyncFunction for top-level await support
      var AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;

      parent.postMessage({ type: 'exec-ready' }, '*');
    <\/script>
    </body></html>
  `);
  doc.close();
}

function executeJS(code) {
  return new Promise((resolve, reject) => {
    const id = ++execId;
    const iframe = document.getElementById('sandbox');
    const timeout = setTimeout(() => reject(new Error('Execution timed out after 30s')), 30000);

    execCallbacks[id] = (data) => {
      clearTimeout(timeout);
      delete execCallbacks[id];
      resolve(data);
    };

    iframe.contentWindow.postMessage({ type: 'execute', id, code }, '*');
  });
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'exec-result') {
    const cb = execCallbacks[e.data.id];
    if (cb) cb(e.data);
  }
  if (e.data && e.data.type === 'exec-ready') {
    console.log('[sandbox] ready');
  }
});

// ============================================================
// 3. CHAT / LLM INTEGRATION
// ============================================================
let messages = [];
let isProcessing = false;

// ── Config management (multiple saved configs) ──────────────
function getConfigs() {
  try { return JSON.parse(localStorage.getItem(CONFIGS_KEY)) || {}; } catch { return {}; }
}
function setConfigs(configs) {
  localStorage.setItem(CONFIGS_KEY, JSON.stringify(configs));
}
function getActiveConfigName() {
  return localStorage.getItem(ACTIVE_CONFIG_KEY) || '';
}
function setActiveConfigName(name) {
  localStorage.setItem(ACTIVE_CONFIG_KEY, name);
}

function populateConfigSelect() {
  const select = document.getElementById('config-select');
  const configs = getConfigs();
  const activeName = getActiveConfigName();
  select.innerHTML = '';
  // Add a "Manual" entry for unsaved settings
  const manualOpt = document.createElement('option');
  manualOpt.value = '';
  manualOpt.textContent = '— Manual —';
  if (!activeName || !configs[activeName]) manualOpt.selected = true;
  select.appendChild(manualOpt);
  Object.keys(configs).sort().forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === activeName) opt.selected = true;
    select.appendChild(opt);
  });
}

function loadConfig(name) {
  const configs = getConfigs();
  const config = configs[name];
  if (!config) return false;
  document.getElementById('api-key-input').value = config.apiKey || '';
  document.getElementById('model-select').value = config.model || 'gpt-4o';
  // Set API URL in dropdown
  const urlSelect = document.getElementById('api-url-input');
  const url = config.apiUrl || INFERENCE_URLS[0];
  for (let opt of urlSelect.options) {
    if (opt.value === url) { opt.selected = true; break; }
  }
  // Also update the model badge
  document.getElementById('model-badge').textContent = config.model || 'gpt-4o';
  // Save to individual storage keys for backward compat
  localStorage.setItem(API_KEY_KEY, config.apiKey || '');
  localStorage.setItem(MODEL_KEY, config.model || 'gpt-4o');
  localStorage.setItem(API_URL_KEY, url);
  setActiveConfigName(name);
  return true;
}

function saveCurrentAsConfig(name) {
  if (!name || !name.trim()) return false;
  name = name.trim();
  const configs = getConfigs();
  configs[name] = {
    apiKey: document.getElementById('api-key-input').value,
    model: document.getElementById('model-select').value,
    apiUrl: document.getElementById('api-url-input').value
  };
  setConfigs(configs);
  setActiveConfigName(name);
  populateConfigSelect();
  return true;
}

function deleteConfig(name) {
  if (!name) return false;
  const configs = getConfigs();
  if (!configs[name]) return false;
  delete configs[name];
  setConfigs(configs);
  if (getActiveConfigName() === name) {
    setActiveConfigName('');
  }
  populateConfigSelect();
  return true;
}

function loadSettings() {
  // Populate API URL dropdown
  const urlSelect = document.getElementById('api-url-input');
  urlSelect.innerHTML = '';
  INFERENCE_URLS.forEach(url => {
    const opt = document.createElement('option');
    opt.value = url;
    opt.textContent = url;
    urlSelect.appendChild(opt);
  });

  // Try loading the active config first
  const activeName = getActiveConfigName();
  const configs = getConfigs();
  if (activeName && configs[activeName]) {
    loadConfig(activeName);
  } else {
    // Fall back to individual storage keys
    const savedKey = localStorage.getItem(API_KEY_KEY) || '';
    const savedModel = localStorage.getItem(MODEL_KEY) || 'gpt-4o';
    const savedUrl = localStorage.getItem(API_URL_KEY) || INFERENCE_URLS[0];
    document.getElementById('api-key-input').value = savedKey;
    document.getElementById('model-select').value = savedModel;
    for (let opt of urlSelect.options) {
      if (opt.value === savedUrl) { opt.selected = true; break; }
    }
    document.getElementById('model-badge').textContent = savedModel;
  }

  populateConfigSelect();
}

function saveSettings() {
  // Save to individual storage keys for backward compat
  localStorage.setItem(API_KEY_KEY, document.getElementById('api-key-input').value);
  localStorage.setItem(MODEL_KEY, document.getElementById('model-select').value);
  localStorage.setItem(API_URL_KEY, document.getElementById('api-url-input').value);
  document.getElementById('model-badge').textContent = document.getElementById('model-select').value;
}

function loadMessages() {
  try {
    messages = JSON.parse(localStorage.getItem(MSGS_KEY)) || [];
  } catch { messages = []; }
  renderMessages();
}
function saveMessages() {
  localStorage.setItem(MSGS_KEY, JSON.stringify(messages));
}

const SYSTEM_PROMPT = `You are a browser-based coding agent. You have access to tools for reading/writing files, executing JavaScript, and more. Use the provided tools to complete the user's request. When finished, reply in plain text.

## Guidelines:
- Always read a file before editing it.
- Use str_replace for targeted edits rather than rewriting entire files.
- When writing code, prefer clean, well-structured solutions.
- Use execute_js to test code and verify it works.
- You can create HTML files and open them in a new tab using: window.open(URL.createObjectURL(new Blob([content], {type:'text/html'})))
- Be thorough and test your work.`;

const TOOLS = [
  {
    type: "function",
    function: {
      name: "read_file",
      description: "Read the contents of a file. Returns the file content or an error.",
      parameters: {
        type: "object",
        properties: {
          path: { type: "string", description: "Path to the file." }
        },
        required: ["path"]
      }
    }
  },
  {
    type: "function",
    function: {
      name: "write_file",
      description: "Create or overwrite a file with the given content.",
      parameters: {
        type: "object",
        properties: {
          path: { type: "string", description: "Path to the file." },
          content: { type: "string", description: "Content to write." }
        },
        required: ["path", "content"]
      }
    }
  },
  {
    type: "function",
    function: {
      name: "str_replace",
      description: "Replace the FIRST occurrence of old_str with new_str in the specified file. Use this for making targeted edits.",
      parameters: {
        type: "object",
        properties: {
          path: { type: "string", description: "Path to the file." },
          old_str: { type: "string", description: "The string to replace." },
          new_str: { type: "string", description: "The replacement string." }
        },
        required: ["path", "old_str", "new_str"]
      }
    }
  },
  {
    type: "function",
    function: {
      name: "execute_js",
      description: "Execute JavaScript code in a sandboxed browser environment. All browser APIs are available (DOM, fetch, console, etc.). The code runs in an async wrapper so you can use top-level await. Returns stdout/stderr output and the return value.",
      parameters: {
        type: "object",
        properties: {
          code: { type: "string", description: "JavaScript code to execute." }
        },
        required: ["code"]
      }
    }
  },
  {
    type: "function",
    function: {
      name: "list_files",
      description: "List all files in the workspace.",
      parameters: {
        type: "object",
        properties: {}
      }
    }
  },
  {
    type: "function",
    function: {
      name: "delete_file",
      description: "Delete a file from the workspace.",
      parameters: {
        type: "object",
        properties: {
          path: { type: "string", description: "Path to the file to delete." }
        },
        required: ["path"]
      }
    }
  },
  {
    type: "function",
    function: {
      name: "finish",
      description: "Call this when you have completed the user's request. Provide a summary of what was done.",
      parameters: {
        type: "object",
        properties: {
          message: { type: "string", description: "Summary of what was done." }
        },
        required: ["message"]
      }
    }
  }
];

function buildAPIMessages() {
  const msgs = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...messages.map(m => {
      const msg = { role: m.role };
      // OpenAI API requires content to be null (not a string) when tool_calls are present
      if (m.tool_calls) {
        msg.content = null;
        msg.tool_calls = m.tool_calls;
      } else if (m.content) {
        msg.content = m.content;
      }
      if (m.tool_call_id) {
        msg.tool_call_id = m.tool_call_id;
      }
      return msg;
    })
  ];
  return msgs;
}

async function callLLM() {
  const apiKey = document.getElementById('api-key-input').value;
  const model = document.getElementById('model-select').value;
  const apiUrl = document.getElementById('api-url-input').value;

  if (!apiKey) {
    addMessage('system', '⚠️ Please set your API key in the settings bar.');
    return null;
  }

  const body = {
    model: model,
    messages: buildAPIMessages(),
    tools: TOOLS,
    tool_choice: "auto",
    temperature: 0.2,
    max_tokens: 4096
  };

  let url = `${apiUrl}/chat/completions`;
  let headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${apiKey}`
  };

  const fetchOptions = { method: 'POST', headers, body: JSON.stringify(body), mode: 'cors', credentials: 'omit' };
  let response;
  try {
    response = await fetch(url, fetchOptions);
  } catch (firstErr) {
    // First attempt failed (CORS preflight may not have completed yet) — retry once
    try {
      await new Promise(r => setTimeout(r, 500));
      response = await fetch(url, fetchOptions);
    } catch (networkErr) {
      addMessage('system', `❌ Network Error: Failed to connect to ${apiUrl}\nHTTP status: N/A\nDetails: ${networkErr.message}`);
      return null;
    }
  }

  if (!response.ok) {
    let errText = '';
    try {
      errText = await response.text();
    } catch (bodyErr) {
      errText = `(could not read response body: ${bodyErr.message})`;
    }
    addMessage('system', `❌ API Error\nHTTP status: ${response.status} ${response.statusText}\n${errText}`);
    return null;
  }

  try {
    const data = await response.json();
    const msg = data.choices?.[0]?.message;
    return {
      content: msg?.content || '',
      tool_calls: msg?.tool_calls || []
    };
  } catch (parseErr) {
    addMessage('system', `❌ API Error: Failed to parse response JSON\nHTTP status: ${response.status} ${response.statusText}\nDetails: ${parseErr.message}`);
    return null;
  }
}

function parseToolCalls(response) {
  // response is now { content, tool_calls } from the API
  const tool_calls = (response.tool_calls || []).map(tc => ({
    tool: tc.function.name,
    params: JSON.parse(tc.function.arguments || '{}')
  }));
  return {
    message: response.content || '',
    tool_calls
  };
}

async function executeToolCall(tc) {
  const { tool, params } = tc;
  addMessage('tool', `🔧 Calling: ${tool}(${JSON.stringify(params)})`);

  try {
    let result;
    switch (tool) {
      case 'read_file':
        result = readFile(params.path);
        break;
      case 'write_file':
        result = writeFile(params.path, params.content);
        break;
      case 'str_replace':
        result = strReplace(params.path, params.old_str, params.new_str);
        break;
      case 'execute_js':
        const execResult = await executeJS(params.code);
        // Build inline exec message
        let execLines = '';
        if (execResult.outputs && execResult.outputs.length > 0) {
          execLines = execResult.outputs.map(o => o.text).join('\n');
        }
        if (execResult.error) {
          execLines += (execLines ? '\n' : '') + `Error: ${execResult.error}`;
          result = { error: execResult.error, outputs: execResult.outputs };
        } else {
          execLines += (execLines ? '\n' : '') + `→ ${execResult.result}`;
          result = { result: execResult.result, outputs: execResult.outputs };
        }
        // Show exec output as a chat message with scrollable container
        addExecMessage(execLines);
        break;
      case 'list_files':
        result = { files: listFiles() };
        break;
      case 'delete_file':
        result = deleteFile(params.path);
        break;
      case 'finish':
        result = { done: true, summary: params.message || 'Task complete.' };
        break;
      default:
        result = { error: `Unknown tool: ${tool}` };
    }
    return result;
  } catch (err) {
    return { error: err.message };
  }
}

async function processUserMessage(userText) {
  if (isProcessing) return;
  isProcessing = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('chat-input').disabled = true;

  addMessage('user', userText);
  messages.push({ role: 'user', content: userText });
  saveMessages();

  let iterations = 0;
  const maxIterations = 20;

  while (iterations < maxIterations) {
    iterations++;
    const response = await callLLM();
    if (!response) break;

    const parsed = parseToolCalls(response);

    if (!parsed.tool_calls || parsed.tool_calls.length === 0) {
      if (parsed.message) {
        addMessage('assistant', parsed.message);
        messages.push({ role: 'assistant', content: parsed.message });
        saveMessages();
      }
      break;
    }

    // Build the assistant message with tool_calls for the API
    // content must be null when tool_calls are present (OpenAI API requirement)
    const assistantMsg = {
      role: 'assistant',
      content: null,
      tool_calls: response.tool_calls  // original tool_calls from API
    };
    messages.push(assistantMsg);
    saveMessages();
    // Show the message text in the UI separately
    if (parsed.message) {
      addMessage('assistant', parsed.message);
    }

    // Execute all tool calls
    for (const tc of parsed.tool_calls) {
      const result = await executeToolCall(tc);

      // Add result to messages using proper tool role format
      const resultStr = JSON.stringify(result, null, 2);
      addMessage('tool', `✅ ${tc.tool} result:\n${resultStr}`);
      messages.push({
        role: 'tool',
        tool_call_id: response.tool_calls.find(t => t.function.name === tc.tool)?.id || '',
        content: resultStr
      });
      saveMessages();

      // Check if finish was called
      if (tc.tool === 'finish') {
        iterations = maxIterations; // break outer loop
        break;
      }
    }
  }

  if (iterations >= maxIterations) {
    addMessage('system', '⚠️ Reached maximum iteration limit. The agent may not have completed its task.');
  }

  isProcessing = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').disabled = false;
  document.getElementById('chat-input').focus();
}

// ============================================================
// 4. UI RENDERING
// ============================================================
function addMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = `msg ${m.role}`;
    div.textContent = m.content;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function addExecMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg exec';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// 5. EVENT BINDING & INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  loadSettings();
  loadMessages();
  initSandbox();

  // Toggle settings bar when clicking the panel header
  document.getElementById('panel-header').onclick = () => {
    const bar = document.getElementById('settings-bar');
    bar.style.display = bar.style.display === 'none' ? '' : 'none';
  };

  // Chat send
  document.getElementById('send-btn').onclick = async () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || isProcessing) return;
    input.value = '';
    await processUserMessage(text);
  };

  document.getElementById('chat-input').onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('send-btn').click();
    }
  };

  // Settings save on change
  document.getElementById('api-key-input').onchange = saveSettings;
  document.getElementById('model-select').onchange = saveSettings;
  document.getElementById('api-url-input').onchange = saveSettings;

  // Config management
  document.getElementById('config-select').onchange = function() {
    const name = this.value;
    if (name) {
      loadConfig(name);
    } else {
      // Manual mode – load from individual keys
      const savedKey = localStorage.getItem(API_KEY_KEY) || '';
      const savedModel = localStorage.getItem(MODEL_KEY) || 'gpt-4o';
      const savedUrl = localStorage.getItem(API_URL_KEY) || INFERENCE_URLS[0];
      document.getElementById('api-key-input').value = savedKey;
      document.getElementById('model-select').value = savedModel;
      const urlSelect = document.getElementById('api-url-input');
      for (let opt of urlSelect.options) {
        if (opt.value === savedUrl) { opt.selected = true; break; }
      }
      document.getElementById('model-badge').textContent = savedModel;
      setActiveConfigName('');
    }
  };

  document.getElementById('save-config-btn').onclick = function() {
    const nameInput = document.getElementById('config-name-input');
    let name = nameInput.value.trim();
    if (!name) {
      // Auto-generate from model name
      const model = document.getElementById('model-select').value;
      name = model || 'my-config';
    }
    if (saveCurrentAsConfig(name)) {
      nameInput.value = '';
      addMessage('system', `✅ Config "${name}" saved.`);
    }
  };

  document.getElementById('delete-config-btn').onclick = function() {
    const select = document.getElementById('config-select');
    const name = select.value;
    if (!name) {
      addMessage('system', '⚠️ Select a config to delete.');
      return;
    }
    if (confirm(`Delete config "${name}"?`)) {
      deleteConfig(name);
      addMessage('system', `🗑 Config "${name}" deleted.`);
    }
  };

  // Allow pressing Enter in config name input to save
  document.getElementById('config-name-input').onkeydown = function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('save-config-btn').click();
    }
  };

  // Clear chat
  document.getElementById('clear-chat-btn').onclick = () => {
    messages = [];
    saveMessages();
    renderMessages();
  };

  // Keyboard shortcut: Ctrl+Enter to send from chat
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      const chatInput = document.getElementById('chat-input');
      if (document.activeElement === chatInput) {
        document.getElementById('send-btn').click();
      }
    }
  });

  // Welcome message
  if (messages.length === 0) {
    addMessage('system', '🚀 Welcome to the Browser Coding Agent!\n\nSet your API key above, then ask me to write code. I can read/write files, execute JavaScript, and more.');
  }
});
</script>
