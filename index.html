<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Coding Agent</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --danger: #f85149;
    --success: #3fb950;
    --warning: #d29922;
    --code-bg: #1c2128;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }
  .panel {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-header .badge {
    font-size: 10px;
    background: var(--accent);
    color: #000;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 700;
  }
  /* Chat Panel */
  #chat-panel { grid-column: 1; grid-row: 1 / 3; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 90%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    background: #1f6feb33;
    align-self: flex-end;
    border: 1px solid #1f6feb44;
  }
  .msg.assistant {
    background: var(--code-bg);
    align-self: flex-start;
    border: 1px solid var(--border);
  }
  .msg.tool {
    background: #3fb95022;
    align-self: flex-start;
    border: 1px solid #3fb95033;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
  }
  .msg.error {
    background: #f8514922;
    align-self: flex-start;
    border: 1px solid #f8514933;
  }
  .msg .tool-name {
    font-weight: 600;
    color: var(--accent);
  }
  .msg .tool-result {
    margin-top: 4px;
    color: var(--text-muted);
  }
  .input-area {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    min-height: 40px;
    max-height: 120px;
  }
  .input-area textarea:focus { outline: none; border-color: var(--accent); }
  .input-area button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  .input-area button:hover { background: var(--accent-hover); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  /* Files Panel */
  #files-panel { grid-column: 2; grid-row: 1; }
  #files-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .file-tabs {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .file-tab {
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    border-right: 1px solid var(--border);
    color: var(--text-muted);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .file-tab.active { background: var(--code-bg); color: var(--text); border-bottom: 2px solid var(--accent); }
  .file-tab .close-btn {
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    opacity: 0.5;
    margin-left: 4px;
  }
  .file-tab .close-btn:hover { opacity: 1; }
  #editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #editor-area textarea {
    flex: 1;
    background: var(--code-bg);
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    padding: 12px;
    resize: none;
    tab-size: 2;
    outline: none;
  }
  .editor-toolbar {
    padding: 6px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    align-items: center;
  }
  .editor-toolbar button {
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .editor-toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  .editor-toolbar .file-path {
    color: var(--text-muted);
    font-size: 11px;
    font-family: monospace;
    margin-left: auto;
  }
  /* File list sidebar */
  #file-list {
    width: 180px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 4px 0;
  }
  #file-list .file-item {
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #file-list .file-item:hover { background: var(--code-bg); color: var(--text); }
  #file-list .file-item .icon { font-size: 14px; }
  #files-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  /* Execution Panel */
  #exec-panel { grid-column: 2; grid-row: 2; }
  #exec-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #exec-output {
    flex: 1;
    background: var(--code-bg);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    padding: 12px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--text);
    line-height: 1.5;
  }
  #exec-output .stdout { color: var(--text); }
  #exec-output .stderr { color: var(--danger); }
  #exec-output .system { color: var(--text-muted); font-style: italic; }
  #exec-input-area {
    padding: 6px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  #exec-input-area textarea {
    flex: 1;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 8px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    resize: none;
    min-height: 32px;
    max-height: 80px;
  }
  #exec-input-area textarea:focus { outline: none; border-color: var(--accent); }
  #exec-input-area button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
  }
  #exec-input-area button:hover { background: var(--accent-hover); }
  /* Settings */
  #settings-bar {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #settings-bar label {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #settings-bar input, #settings-bar select {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 3px 6px;
    font-size: 11px;
    font-family: monospace;
  }
  #settings-bar input:focus, #settings-bar select:focus { outline: none; border-color: var(--accent); }
  #settings-bar input[type="password"] { width: 200px; }
  #settings-bar select { width: 140px; }
  .btn-small {
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }
  .btn-small.danger:hover { border-color: var(--danger); color: var(--danger); }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  /* Loading dots */
  .loading::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── Mobile / narrow portrait layout ─────────────────────────── */
  @media (max-width: 768px) {
    body { overflow: auto; }
    .app {
      display: flex;
      flex-direction: column;
      height: auto;
      min-height: 100vh;
      gap: 0;
    }
    .panel {
      height: 50vh;
      min-height: 300px;
      flex-shrink: 0;
    }
    #chat-panel { height: 60vh; min-height: 400px; }
    #files-panel { height: 50vh; min-height: 300px; }
    #exec-panel { height: 40vh; min-height: 250px; }

    #settings-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      padding: 6px 8px;
    }
    #settings-bar label {
      flex-wrap: wrap;
      font-size: 10px;
    }
    #settings-bar input[type="password"] { width: 100%; }
    #settings-bar input[type="text"] { width: 100% !important; }
    #settings-bar select { width: 100% !important; }
    #settings-bar .btn-small { font-size: 10px; padding: 2px 6px; }

    #file-list { width: 120px; }
    .file-tab { font-size: 10px; padding: 4px 8px; }
    .editor-toolbar button { font-size: 10px; padding: 3px 6px; }

    .input-area textarea { font-size: 12px; min-height: 36px; }
    .input-area button { font-size: 12px; padding: 6px 12px; }

    #exec-input-area textarea { font-size: 11px; }
    #exec-input-area button { font-size: 11px; padding: 4px 8px; }

    .msg { font-size: 12px; max-width: 95%; }
  }

  @media (max-width: 480px) {
    .panel-header { font-size: 10px; padding: 4px 8px; }
    .panel-header .badge { font-size: 8px; }
    #chat-panel { height: 55vh; min-height: 350px; }
    #files-panel { height: 45vh; min-height: 250px; }
    #exec-panel { height: 35vh; min-height: 200px; }
    #file-list { width: 100px; }
    .file-item { font-size: 10px; padding: 3px 8px; }
    #editor-area textarea { font-size: 11px; padding: 8px; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Chat Panel -->
  <div class="panel" id="chat-panel">
    <div class="panel-header">
      <span>💬 Chat</span>
      <span class="badge" id="model-badge">agent</span>
    </div>
    <div id="settings-bar">
      <label>API Key <input type="password" id="api-key-input" placeholder="sk-..."></label>
      <label>Model <input type="text" id="model-select" value="gpt-4o" style="width:140px"></label>
      <label>API URL <select id="api-url-input" style="width:200px"></select></label>
      <button class="btn-small" id="clear-chat-btn">Clear Chat</button>
      <button class="btn-small danger" id="reset-files-btn">Reset Files</button>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="chat-input" placeholder="Ask the agent to write code..." rows="2"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Files Panel -->
  <div class="panel" id="files-panel">
    <div class="panel-header">
      <span>📁 Files</span>
      <span class="badge" id="file-count">0</span>
    </div>
    <div id="files-content">
      <div id="files-body">
        <div id="file-list"></div>
        <div id="editor-area">
          <div class="file-tabs" id="file-tabs"></div>
          <textarea id="editor-textarea" placeholder="Select or create a file..."></textarea>
          <div class="editor-toolbar">
            <button id="new-file-btn">+ New</button>
            <button id="save-file-btn">💾 Save</button>
            <button id="delete-file-btn" class="danger">🗑 Delete</button>
            <span class="file-path" id="current-path">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Execution Panel -->
  <div class="panel" id="exec-panel">
    <div class="panel-header">
      <span>⚡ Code Execution</span>
      <span class="badge" id="exec-status">idle</span>
    </div>
    <div id="exec-content">
      <div id="exec-output"></div>
      <div id="exec-input-area">
        <textarea id="exec-input" placeholder="Run JS code (or let the agent do it)..." rows="1"></textarea>
        <button id="exec-run-btn">Run</button>
        <button class="btn-small" id="exec-clear-btn">Clear</button>
      </div>
    </div>
  </div>
</div>

<!-- Sandbox iframe (hidden) -->
<iframe id="sandbox" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>

<script>
// ============================================================
// 1. STORAGE LAYER (localStorage-backed file system)
// ============================================================
const STORAGE_KEY = 'agent_files';
const API_KEY_KEY = 'agent_api_key';
const MSGS_KEY = 'agent_messages';
const MODEL_KEY = 'agent_model';
const API_URL_KEY = 'agent_api_url';

// Inference URLs extracted from agent_probe JSON spec files
const INFERENCE_URLS = [
  "https://openrouter.ai/api/v1",
  "https://assert-service.services.ai.azure.com/openai/deployments/deepseek-v4-flash?api-version=2024-12-01-preview",
  "https://assert-service.services.ai.azure.com/openai/deployments/kimi-k2.6?api-version=2024-12-01-preview",
  "https://integrate.api.nvidia.com/v1",
  "https://api.modelstream.ai/v1",
  "https://opencode.ai/zen/v1",
  "https://gpu1.eecs.kth.se/services/ollama-keys/v1"
];

function getFiles() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function setFiles(files) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
  updateFileList();
}
function readFile(path) {
  const files = getFiles();
  if (files[path] === undefined) return { error: `File not found: ${path}` };
  return { content: files[path] };
}
function writeFile(path, content) {
  const files = getFiles();
  files[path] = content;
  setFiles(files);
  return { success: true, path };
}
function deleteFile(path) {
  const files = getFiles();
  if (files[path] === undefined) return { error: `File not found: ${path}` };
  delete files[path];
  setFiles(files);
  return { success: true, path };
}
function strReplace(path, oldStr, newStr) {
  const files = getFiles();
  if (files[path] === undefined) return { error: `File not found: ${path}` };
  const content = files[path];
  const idx = content.indexOf(oldStr);
  if (idx === -1) return { error: `String not found in ${path}` };
  files[path] = content.substring(0, idx) + newStr + content.substring(idx + oldStr.length);
  setFiles(files);
  return { success: true, path, replaced: oldStr.length, newLength: files[path].length };
}
function listFiles() {
  return Object.keys(getFiles()).sort();
}

// ============================================================
// 2. SANDBOXED CODE EXECUTION
// ============================================================
let execId = 0;
const execCallbacks = {};

function initSandbox() {
  const iframe = document.getElementById('sandbox');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(`
    <!DOCTYPE html>
    <html><body>
    <script>
      // Minimal harness - exposes all browser APIs
      const originalConsole = console;
      const outputs = [];
      function captureConsole() {
        const methods = ['log','info','warn','error','debug','dir','table'];
        methods.forEach(m => {
          const orig = originalConsole[m];
          console[m] = function(...args) {
            outputs.push({ type: m === 'error' ? 'stderr' : 'stdout', text: args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') });
            orig.apply(originalConsole, args);
          };
        });
      }
      captureConsole();

      // Handle execution requests
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'execute') {
          const id = e.data.id;
          const code = e.data.code;
          outputs.length = 0;
          let result, error = null;
          try {
            // Wrap in async function to support top-level await
            const asyncFn = new AsyncFunction('"use strict"; ' + code);
            const promise = asyncFn();
            if (promise && typeof promise.then === 'function') {
              promise.then(r => {
                result = r;
                parent.postMessage({ type: 'exec-result', id, result: formatResult(result), outputs: outputs.slice(), error: null }, '*');
              }).catch(err => {
                parent.postMessage({ type: 'exec-result', id, result: null, outputs: outputs.slice(), error: err.message }, '*');
              });
              return;
            }
            result = promise;
          } catch(err) {
            error = err.message;
          }
          parent.postMessage({ type: 'exec-result', id, result: formatResult(result), outputs: outputs.slice(), error }, '*');
        }
      });

      function formatResult(r) {
        if (r === undefined) return 'undefined';
        if (r === null) return 'null';
        try { return JSON.stringify(r, null, 2); } catch { return String(r); }
      }

      // AsyncFunction for top-level await support
      var AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;

      parent.postMessage({ type: 'exec-ready' }, '*');
    <\/script>
    </body></html>
  `);
  doc.close();
}

function executeJS(code) {
  return new Promise((resolve, reject) => {
    const id = ++execId;
    const iframe = document.getElementById('sandbox');
    const timeout = setTimeout(() => reject(new Error('Execution timed out after 30s')), 30000);

    execCallbacks[id] = (data) => {
      clearTimeout(timeout);
      delete execCallbacks[id];
      resolve(data);
    };

    iframe.contentWindow.postMessage({ type: 'execute', id, code }, '*');
  });
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'exec-result') {
    const cb = execCallbacks[e.data.id];
    if (cb) cb(e.data);
  }
  if (e.data && e.data.type === 'exec-ready') {
    console.log('[sandbox] ready');
  }
});

// ============================================================
// 3. CHAT / LLM INTEGRATION
// ============================================================
let messages = [];
let isProcessing = false;

function loadSettings() {
  const savedKey = localStorage.getItem(API_KEY_KEY) || '';
  const savedModel = localStorage.getItem(MODEL_KEY) || 'gpt-4o';
  const savedUrl = localStorage.getItem(API_URL_KEY) || INFERENCE_URLS[0];
  document.getElementById('api-key-input').value = savedKey;
  document.getElementById('model-select').value = savedModel;
  // Populate API URL dropdown
  const urlSelect = document.getElementById('api-url-input');
  urlSelect.innerHTML = '';
  INFERENCE_URLS.forEach(url => {
    const opt = document.createElement('option');
    opt.value = url;
    opt.textContent = url;
    if (url === savedUrl) opt.selected = true;
    urlSelect.appendChild(opt);
  });
  document.getElementById('model-badge').textContent = savedModel;
}
function saveSettings() {
  localStorage.setItem(API_KEY_KEY, document.getElementById('api-key-input').value);
  localStorage.setItem(MODEL_KEY, document.getElementById('model-select').value);
  localStorage.setItem(API_URL_KEY, document.getElementById('api-url-input').value);
  document.getElementById('model-badge').textContent = document.getElementById('model-select').value;
}

function loadMessages() {
  try {
    messages = JSON.parse(localStorage.getItem(MSGS_KEY)) || [];
  } catch { messages = []; }
  renderMessages();
}
function saveMessages() {
  localStorage.setItem(MSGS_KEY, JSON.stringify(messages));
}

const SYSTEM_PROMPT = `You are a browser-based coding agent. You have access to the following tools:

## Tool: read_file(path)
Read the contents of a file. Returns the file content or an error.

## Tool: write_file(path, content)
Create or overwrite a file with the given content.

## Tool: str_replace(path, old_str, new_str)
Replace the FIRST occurrence of old_str with new_str in the specified file. Use this for making targeted edits.

## Tool: execute_js(code)
Execute JavaScript code in a sandboxed browser environment. All browser APIs are available (DOM, fetch, console, etc.). The code runs in an async wrapper so you can use top-level await. Returns stdout/stderr output and the return value.

## Tool: list_files()
List all files in the workspace.

## Tool: delete_file(path)
Delete a file from the workspace.

## Tool: finish(message)
Call this when you have completed the user's request. Provide a summary of what was done.

## Guidelines:
- Always read a file before editing it.
- Use str_replace for targeted edits rather than rewriting entire files.
- When writing code, prefer clean, well-structured solutions.
- Use execute_js to test code and verify it works.
- You can create HTML files and open them in a new tab using: window.open(URL.createObjectURL(new Blob([content], {type:'text/html'})))
- Be thorough and test your work.

## Response Format
You MUST respond with a JSON object containing your response. The format is:
{
  "message": "Your text response to the user",
  "tool_calls": [
    {
      "tool": "tool_name",
      "params": { ... }
    }
  ]
}

If you don't need to call any tools, set tool_calls to an empty array.
Always respond with valid JSON.`;

function buildAPIMessages() {
  const msgs = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...messages.map(m => ({ role: m.role, content: m.content }))
  ];
  return msgs;
}

async function callLLM() {
  const apiKey = document.getElementById('api-key-input').value;
  const model = document.getElementById('model-select').value;
  const apiUrl = document.getElementById('api-url-input').value;

  if (!apiKey) {
    addMessage('system', '⚠️ Please set your API key in the settings bar.');
    return null;
  }

  const body = {
    model: model,
    messages: buildAPIMessages(),
    temperature: 0.2,
    max_tokens: 4096
  };

  // For Anthropic models, use different endpoint
  let url = `${apiUrl}/chat/completions`;
  let headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${apiKey}`
  };

  if (model.startsWith('claude-')) {
    // Use Anthropic API format
    url = apiUrl.includes('anthropic') ? `${apiUrl}/messages` : 'https://api.anthropic.com/v1/messages';
    headers = {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    };
    body.model = model;
    body.max_tokens = 4096;
    // Convert messages to Anthropic format
    const sysMsg = body.messages.find(m => m.role === 'system');
    const otherMsgs = body.messages.filter(m => m.role !== 'system');
    body.system = sysMsg ? sysMsg.content : '';
    body.messages = otherMsgs;
  }

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API error ${response.status}: ${errText}`);
    }

    const data = await response.json();

    let content;
    if (model.startsWith('claude-')) {
      content = data.content?.[0]?.text || '';
    } else {
      content = data.choices?.[0]?.message?.content || '';
    }

    return content;
  } catch (err) {
    addMessage('system', `❌ API Error: ${err.message}`);
    return null;
  }
}

function parseToolCalls(text) {
  try {
    // Try to parse as JSON
    const parsed = JSON.parse(text);
    return {
      message: parsed.message || '',
      tool_calls: parsed.tool_calls || []
    };
  } catch {
    // Try to extract JSON from markdown code block
    const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) {
      try {
        const parsed = JSON.parse(jsonMatch[1]);
        return {
          message: parsed.message || text,
          tool_calls: parsed.tool_calls || []
        };
      } catch {}
    }
    // Return raw text as message with no tool calls
    return { message: text, tool_calls: [] };
  }
}

async function executeToolCall(tc) {
  const { tool, params } = tc;
  addMessage('tool', `🔧 Calling: ${tool}(${JSON.stringify(params)})`);

  try {
    let result;
    switch (tool) {
      case 'read_file':
        result = readFile(params.path);
        break;
      case 'write_file':
        result = writeFile(params.path, params.content);
        break;
      case 'str_replace':
        result = strReplace(params.path, params.old_str, params.new_str);
        break;
      case 'execute_js':
        setExecStatus('running');
        appendExecOutput(`> Executing code...\n`, 'system');
        const execResult = await executeJS(params.code);
        if (execResult.outputs && execResult.outputs.length > 0) {
          execResult.outputs.forEach(o => {
            appendExecOutput(o.text + '\n', o.type);
          });
        }
        if (execResult.error) {
          appendExecOutput(`Error: ${execResult.error}\n`, 'stderr');
          result = { error: execResult.error, outputs: execResult.outputs };
        } else {
          appendExecOutput(`→ Result: ${execResult.result}\n`, 'stdout');
          result = { result: execResult.result, outputs: execResult.outputs };
        }
        setExecStatus('idle');
        break;
      case 'list_files':
        result = { files: listFiles() };
        break;
      case 'delete_file':
        result = deleteFile(params.path);
        break;
      case 'finish':
        result = { done: true, summary: params.message || 'Task complete.' };
        break;
      default:
        result = { error: `Unknown tool: ${tool}` };
    }
    return result;
  } catch (err) {
    return { error: err.message };
  }
}

async function processUserMessage(userText) {
  if (isProcessing) return;
  isProcessing = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('chat-input').disabled = true;

  addMessage('user', userText);
  messages.push({ role: 'user', content: userText });
  saveMessages();

  let iterations = 0;
  const maxIterations = 20;

  while (iterations < maxIterations) {
    iterations++;
    const response = await callLLM();
    if (!response) break;

    const parsed = parseToolCalls(response);

    if (parsed.message) {
      addMessage('assistant', parsed.message);
      messages.push({ role: 'assistant', content: parsed.message });
      saveMessages();
    }

    if (!parsed.tool_calls || parsed.tool_calls.length === 0) {
      break;
    }

    // Execute all tool calls
    let allResults = [];
    for (const tc of parsed.tool_calls) {
      const result = await executeToolCall(tc);
      allResults.push({ tool: tc.tool, params: tc.params, result });

      // Add result to messages
      const resultStr = JSON.stringify(result, null, 2);
      addMessage('tool', `✅ ${tc.tool} result:\n${resultStr}`);
      messages.push({ role: 'user', content: `Tool result for ${tc.tool}: ${resultStr}` });
      saveMessages();

      // Check if finish was called
      if (tc.tool === 'finish') {
        iterations = maxIterations; // break outer loop
        break;
      }
    }
  }

  if (iterations >= maxIterations) {
    addMessage('system', '⚠️ Reached maximum iteration limit. The agent may not have completed its task.');
  }

  isProcessing = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').disabled = false;
  document.getElementById('chat-input').focus();
}

// ============================================================
// 4. UI RENDERING
// ============================================================
function addMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = `msg ${m.role}`;
    div.textContent = m.content;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function updateFileList() {
  const files = listFiles();
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  document.getElementById('file-count').textContent = files.length;

  if (files.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'file-item';
    empty.style.color = 'var(--text-muted)';
    empty.style.fontStyle = 'italic';
    empty.textContent = 'No files yet';
    list.appendChild(empty);
    return;
  }

  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item';
    const ext = f.split('.').pop();
    const icon = ext === 'html' ? '🌐' : ext === 'js' ? '📜' : ext === 'css' ? '🎨' : ext === 'json' ? '📋' : '📄';
    item.innerHTML = `<span class="icon">${icon}</span>${f}`;
    item.onclick = () => openFile(f);
    list.appendChild(item);
  });
}

let openTabs = [];
let activeTab = null;

function openFile(path) {
  const result = readFile(path);
  if (result.error) return;

  if (!openTabs.includes(path)) {
    openTabs.push(path);
  }
  activeTab = path;
  renderTabs();
  document.getElementById('editor-textarea').value = result.content;
  document.getElementById('current-path').textContent = path;
}

function renderTabs() {
  const container = document.getElementById('file-tabs');
  container.innerHTML = '';
  openTabs.forEach(f => {
    const tab = document.createElement('div');
    tab.className = `file-tab${f === activeTab ? ' active' : ''}`;
    tab.textContent = f.split('/').pop();
    const close = document.createElement('span');
    close.className = 'close-btn';
    close.textContent = '×';
    close.onclick = (e) => {
      e.stopPropagation();
      openTabs = openTabs.filter(t => t !== f);
      if (activeTab === f) {
        activeTab = openTabs.length > 0 ? openTabs[openTabs.length - 1] : null;
        if (activeTab) {
          const r = readFile(activeTab);
          document.getElementById('editor-textarea').value = r.content || '';
          document.getElementById('current-path').textContent = activeTab;
        } else {
          document.getElementById('editor-textarea').value = '';
          document.getElementById('current-path').textContent = '—';
        }
      }
      renderTabs();
    };
    tab.onclick = () => {
      activeTab = f;
      renderTabs();
      const r = readFile(f);
      document.getElementById('editor-textarea').value = r.content || '';
      document.getElementById('current-path').textContent = f;
    };
    container.appendChild(tab);
  });
}

function setExecStatus(status) {
  const badge = document.getElementById('exec-status');
  badge.textContent = status;
  badge.style.color = status === 'running' ? 'var(--warning)' : status === 'idle' ? 'var(--text-muted)' : 'var(--text)';
}

function appendExecOutput(text, type = 'stdout') {
  const output = document.getElementById('exec-output');
  const span = document.createElement('span');
  span.className = type;
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
}

// ============================================================
// 5. EVENT BINDING & INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  loadSettings();
  loadMessages();
  updateFileList();
  initSandbox();

  // Chat send
  document.getElementById('send-btn').onclick = async () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || isProcessing) return;
    input.value = '';
    await processUserMessage(text);
  };

  document.getElementById('chat-input').onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('send-btn').click();
    }
  };

  // Settings save on change
  document.getElementById('api-key-input').onchange = saveSettings;
  document.getElementById('model-select').onchange = saveSettings;
  document.getElementById('api-url-input').onchange = saveSettings;

  // Clear chat
  document.getElementById('clear-chat-btn').onclick = () => {
    messages = [];
    saveMessages();
    renderMessages();
  };

  // Reset files
  document.getElementById('reset-files-btn').onclick = () => {
    if (confirm('Delete all files? This cannot be undone.')) {
      setFiles({});
      openTabs = [];
      activeTab = null;
      document.getElementById('editor-textarea').value = '';
      document.getElementById('current-path').textContent = '—';
      renderTabs();
    }
  };

  // New file
  document.getElementById('new-file-btn').onclick = () => {
    const name = prompt('Enter file path (e.g., src/app.js):');
    if (name) {
      writeFile(name, '');
      openFile(name);
    }
  };

  // Save file
  document.getElementById('save-file-btn').onclick = () => {
    if (!activeTab) return;
    const content = document.getElementById('editor-textarea').value;
    writeFile(activeTab, content);
    addMessage('system', `💾 Saved ${activeTab}`);
  };

  // Delete file
  document.getElementById('delete-file-btn').onclick = () => {
    if (!activeTab) return;
    if (confirm(`Delete ${activeTab}?`)) {
      deleteFile(activeTab);
      openTabs = openTabs.filter(t => t !== activeTab);
      activeTab = openTabs.length > 0 ? openTabs[openTabs.length - 1] : null;
      if (activeTab) {
        const r = readFile(activeTab);
        document.getElementById('editor-textarea').value = r.content || '';
        document.getElementById('current-path').textContent = activeTab;
      } else {
        document.getElementById('editor-textarea').value = '';
        document.getElementById('current-path').textContent = '—';
      }
      renderTabs();
    }
  };

  // Execute code
  document.getElementById('exec-run-btn').onclick = async () => {
    const input = document.getElementById('exec-input');
    const code = input.value.trim();
    if (!code) return;
    appendExecOutput(`> ${code}\n`, 'system');
    setExecStatus('running');
    try {
      const result = await executeJS(code);
      if (result.outputs) {
        result.outputs.forEach(o => appendExecOutput(o.text + '\n', o.type));
      }
      if (result.error) {
        appendExecOutput(`Error: ${result.error}\n`, 'stderr');
      } else {
        appendExecOutput(`→ ${result.result}\n`, 'stdout');
      }
    } catch (err) {
      appendExecOutput(`Error: ${err.message}\n`, 'stderr');
    }
    setExecStatus('idle');
    input.value = '';
  };

  document.getElementById('exec-input').onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('exec-run-btn').click();
    }
  };

  document.getElementById('exec-clear-btn').onclick = () => {
    document.getElementById('exec-output').innerHTML = '';
  };

  // Keyboard shortcut: Ctrl+Enter to send from chat
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      const chatInput = document.getElementById('chat-input');
      if (document.activeElement === chatInput) {
        document.getElementById('send-btn').click();
      }
    }
  });

  // Welcome message
  if (messages.length === 0) {
    addMessage('system', '🚀 Welcome to the Browser Coding Agent!\n\nSet your API key above, then ask me to write code. I can read/write files, execute JavaScript, and more.');
  }
});
</script>
